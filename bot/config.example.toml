# Copy this file to bot/config.toml and edit. config.toml is gitignored.

# Where the local KDF binary listens. Matches MM2.json.rpcip + rpcport.
kdf_url = "http://127.0.0.1:7783"

# Must match MM2.json's rpc_password EXACTLY. This is the password our bot
# uses to call KDF; it is NOT a coin daemon RPC password.
rpc_password = "REPLACE_WITH_SAME_VALUE_AS_MM2_JSON_RPC_PASSWORD"

# How much (USD) of each coin to keep posted on each side of the book.
# Total exposure across both orders ~= 2 * usd_per_side (here, $40).
usd_per_side = 20.0

# Half-spread, applied each side. 0.015 = 1.5% above mid for sells and 1.5%
# below mid for buys (~3% round-trip width). Tighten to attract more takers.
spread = 0.015

# How often we recompute price and re-post orders.
refresh_seconds = 90

# Sanity check: skip the cycle if our USDT-derived MEWC/LTC mid is more
# than this fraction off the NonKYC MEWC/LTC pool's last price. As of
# 2026-05 the pool reports isActive:false and its lastPrice is months
# stale (3x off the live USDT-derived mid), so disable by default.
# Re-enable (e.g. 0.50) once a real MEWC/LTC orderbook exists somewhere.
max_drift_vs_pool = 0.0

# Floors: don't post tiny dust orders even if the math says we should.
# In MEWC for the sell-MEWC order; in LTC for the sell-LTC (= buy-MEWC) order.
min_post_volume_mewc = 100.0
min_post_volume_ltc  = 0.001

# How many open MEWC<->LTC orders we tolerate before issuing cancel_all.
# At steady state we have exactly 2 (one per side). If KDF reports more
# (e.g. after a crash) the bot wipes them and reposts.
max_open_orders_per_pair = 2

# ---- Read-only web dashboard (`python -m bot.dashboard`) -------------------
# The dashboard reuses kdf_url + rpc_password above. It NEVER calls write
# RPCs (no setprice / withdraw / cancel) and the rpc_password is never sent
# to the browser. Bind to 127.0.0.1 unless you really know what you're doing
# — the page exposes balances, addresses, open orders, and a tail of bot.log.
# If you need remote access, use an SSH tunnel (`ssh -L 7784:127.0.0.1:7784`).
dashboard_host = "127.0.0.1"
dashboard_port = 7784
